kind = "web"
previewPath = "/"
title = "Flying Sword — AI Flight OS"
version = "1.0.0"
id = "artifacts/flying-sword"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25826

[services.development]
run = "pnpm --filter @workspace/flying-sword run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flying-sword", "run", "build" ]
publicDir = "artifacts/flying-sword/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25826"
BASE_PATH = "/"
